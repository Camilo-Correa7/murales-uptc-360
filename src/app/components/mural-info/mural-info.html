<div class="p-6 md:p-8 text-white flex flex-col h-full">
    
    <h2 class="text-3xl font-bold mb-2 text-white drop-shadow-md leading-tight">
        {{ muralActual?.titulo }}
    </h2>
    <p class="text-blue-400 font-medium mb-6 text-base md:text-lg">
        Autor: {{ muralActual?.autor }}
    </p>

    <div class="bg-white/10 border border-white/20 rounded-2xl p-5 mb-6 backdrop-blur-sm shadow-inner">
        <div class="grid grid-cols-[90px_1fr] gap-3 text-sm md:text-base">
            <span class="font-bold text-gray-200">Fecha:</span>
            <span class="text-gray-300">{{ muralActual?.fecha }}</span>
            
            <span class="font-bold text-gray-200">Técnica:</span>
            <span class="text-gray-300">{{ muralActual?.tecnica }}</span>
            
            <span class="font-bold text-gray-200">Ubicación:</span>
            <span class="text-gray-300">{{ muralActual?.ubicacion }}</span>
        </div>
    </div>

    <h3 class="text-xl font-bold text-white border-b border-white/20 pb-2 mb-4 flex items-center justify-between">
    <span>Análisis de la obra</span>
    <span class="text-xs font-medium text-gray-300 bg-white/10 px-2 py-1 rounded backdrop-blur-sm border border-white/10">
        Autoría propia
    </span>
</h3>
    
    <div class="overflow-y-auto pr-4 text-gray-300 text-sm md:text-base leading-relaxed custom-scrollbar flex-1">
        {{ muralActual?.descripcion }}
    </div>

</div>
