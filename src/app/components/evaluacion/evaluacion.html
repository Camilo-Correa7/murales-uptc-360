<div id="contenedor-evaluacion" class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div
        class="relative w-full bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl shadow-[0_8px_30px_rgba(0,0,0,0.5)] animate-fade-in flex flex-col max-h-[90dvh]">

        <button (click)="cerrar.emit()"
            class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors z-20 bg-black/20 rounded-full p-1 backdrop-blur-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>

        <div id="scroll-interno-eval" class="overflow-y-auto p-6 md:p-10 w-full scroll-smooth">
            <ng-container *ngIf="!evaluacionTerminada">

                <div class="w-full bg-white/10 rounded-full h-2 mb-6 mt-2">
                    <div class="bg-gradient-to-r from-blue-400 to-emerald-400 h-2 rounded-full transition-all duration-500 ease-out"
                        [style.width.%]="((preguntaActual + 1) / preguntas.length) * 100">
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6 border-b border-white/20 pb-4">
                    <h2 class="text-xl md:text-2xl font-bold text-white tracking-wide">Análisis del Mural</h2>
                    <span
                        class="text-xs md:text-sm font-semibold text-emerald-400 bg-emerald-400/10 px-4 py-1.5 rounded-full border border-emerald-400/20">
                        Pregunta {{ preguntaActual + 1 }} de {{ preguntas.length }}
                    </span>
                </div>

                <p class="text-lg md:text-xl text-gray-100 font-medium mb-8 leading-relaxed">
                    {{ preguntas[preguntaActual].pregunta }}
                </p>

                <div class="flex flex-col gap-3 mb-8">
                    <button *ngFor="let opcion of preguntas[preguntaActual].opciones; let i = index"
                        (click)="seleccionarOpcion(i)" [ngClass]="{
            'bg-white/5 hover:bg-white/15 border-white/20 text-gray-300 hover:text-white hover:border-white/40': !mostrarResultado,
            'border-emerald-500 bg-emerald-500/20 text-white shadow-[0_0_15px_rgba(16,185,129,0.3)]': mostrarResultado && i === preguntas[preguntaActual].respuestaCorrecta,
            'border-red-500 bg-red-500/20 text-white': mostrarResultado && i === opcionSeleccionada && i !== preguntas[preguntaActual].respuestaCorrecta,
            'opacity-40 cursor-not-allowed': mostrarResultado && i !== preguntas[preguntaActual].respuestaCorrecta && i !== opcionSeleccionada
          }" class="text-left w-full p-4 md:p-5 rounded-2xl border transition-all duration-300 relative overflow-hidden group">

                        <span class="relative z-10">{{ opcion }}</span>

                        <span *ngIf="mostrarResultado && i === preguntas[preguntaActual].respuestaCorrecta"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-emerald-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7">
                                </path>
                            </svg>
                        </span>
                        <span
                            *ngIf="mostrarResultado && i === opcionSeleccionada && i !== preguntas[preguntaActual].respuestaCorrecta"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-red-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </span>
                    </button>
                </div>

                <div class="flex justify-end h-12">
                    <button *ngIf="mostrarResultado" (click)="siguientePregunta()"
                        class="px-8 py-3 bg-gradient-to-r from-white to-gray-200 text-black font-bold rounded-full hover:scale-105 transition-transform shadow-lg">
                        {{ preguntaActual === preguntas.length - 1 ? 'Ver Resultados' : 'Siguiente Pregunta' }}
                    </button>
                </div>
            </ng-container>

            <ng-container *ngIf="evaluacionTerminada">
                <div class="text-center py-10 animate-fade-in">
                    <div class="inline-block p-4 rounded-full bg-white/10 mb-6 border border-white/20">
                        <svg class="w-16 h-16 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z">
                            </path>
                        </svg>
                    </div>

                    <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-4 tracking-tight">¡Evaluación
                        Completada!
                    </h2>

                    <div
                        class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 drop-shadow-sm">
                        {{ puntuacion }}<span class="text-4xl text-gray-400">/{{ preguntas.length }}</span>
                    </div>

                    <p class="text-lg text-gray-300 mb-10 max-w-md mx-auto leading-relaxed">
                        {{ obtenerMensajeFinal() }}
                    </p>

                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <button (click)="reiniciarEvaluacion()"
                            class="px-8 py-3 border-2 border-white/20 text-white rounded-full hover:bg-white/10 transition-colors font-semibold">
                            Intentar de nuevo
                        </button>
                        <button (click)="cerrar.emit()"
                            class="px-8 py-3 bg-white text-black rounded-full hover:scale-105 transition-transform font-bold shadow-xl">
                            Volver al recorrido
                        </button>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
</div>
