<div class="bg-gray-950 border-t border-gray-800 p-4 md:p-6 mt-auto pt-4">
    <div class="container mx-auto pb-8">
        <h3 class="text-sm font-semibold text-gray-400 mb-4 uppercase tracking-wider flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
            Explora otros murales de la UPTC
        </h3>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 px-4">

            @for (mural of murales; track mural.id) {
            <button (click)="_seleccionarMural(mural)"
                class="w-full relative flex flex-col items-start justify-between p-6 rounded-xl group transition-all duration-300 ease-in-out focus:outline-none bg-gray-900/60 backdrop-blur-sm border shadow-md hover:shadow-xl hover:-translate-y-1 hover:bg-gray-800/80"
                [ngClass]="mural.id === idMuralSeleccionado ? 'border-blue-500 ring-1 ring-blue-500' : 'border-white/10 hover:border-white/30'">

                <div class="mb-4 text-gray-500 group-hover:text-blue-400 transition-colors"
                    [ngClass]="{'text-blue-400': mural.id === idMuralSeleccionado}">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                        </path>
                    </svg>
                </div>

                <div class="text-left w-full pr-6">
                    <h3 class="text-base md:text-lg font-bold text-white leading-tight transition-colors group-hover:text-blue-300"
                        [ngClass]="{'text-blue-400': mural.id === idMuralSeleccionado}">
                        {{ mural.titulo }}
                    </h3>

                    <p class="text-xs md:text-sm text-gray-400 mt-2 font-medium tracking-wide uppercase">
                        {{ mural.autor }}
                    </p>
                </div>

                @if (mural.id === idMuralSeleccionado) {
                <div
                    class="absolute top-5 right-5 bg-blue-600 text-white rounded-full p-1 shadow-[0_0_10px_rgba(37,99,235,0.5)]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 9L19 7"></path>
                    </svg>
                </div>
                }
            </button>
            }

        </div>
    </div>
</div>
